<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Zootopia World · Judith Hopps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f5f7fa, #e9eef3);
      color: #333;
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }

    header h1 {
      font-size: 2.6rem;
      margin-bottom: 0.5rem;
    }

    header p {
      color: #666;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .world {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.4rem;
    }

    .card p {
      color: #666;
      line-height: 1.5;
      margin-bottom: 0;
    }

    footer {
      text-align: center;
      padding: 3rem 1rem;
      font-size: 0.9rem;
      color: #888;
    }
  </style>
</head>

<body>

<header>
  <h1>🦊 Zootopia World</h1>
  <p>
    这是 Judy Hopps 的个人世界。  
    记录、实验、冒险与一些温柔而疯狂的想法。
  </p>
</header>

<section class="world">

  <a class="card" href="blog-index.html">
    <h2>🏠 Judy 的出租屋</h2>
    <p>博客 · 日常 · 思考 · 世界的另一面</p>
  </a>

  <a class="card" href="arcade/">
    <h2>🎮 冒险区 · Arcade</h2>
    <p>小游戏、实验性玩法、城市角落的乐趣</p>
  </a>

  <a class="card" href="archive/">
    <h2>🏛 城市档案馆</h2>
    <p>电影、名著、歌剧中的名言与片段</p>
  </a>

  <a class="card" href="lab/">
    <h2>🧠 Underground Lab</h2>
    <p>操作系统实验、底层世界的探索</p>
  </a>

  <a class="card" href="guestbook/">
    <h2>💬 留言板</h2>
    <p>给这个世界留下些什么</p>
  </a>

</section>

<footer>
  © Judith Hopps · Zootopia World
</footer>

</body>
</html>
