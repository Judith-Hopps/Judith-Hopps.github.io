<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Judy's Room · Mobile</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #0e141b;
  color: #e5e5e5;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
}

/* 每一层 = 一个“深度” */
.layer {
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ===== 第一层：街道 ===== */
.street {
  background: radial-gradient(circle at center, #1f2b38, #0b1016);
}

.street::after {
  content: "Zootopia · Night";
  position: absolute;
  bottom: 12%;
  font-size: 0.9rem;
  opacity: 0.6;
}

/* ===== 第二层：门口 ===== */
.door {
  background: radial-gradient(circle at center, #2b1f16, #0f0b08);
}

.door::after {
  content: "Tap to enter";
  position: absolute;
  bottom: 15%;
  font-size: 0.85rem;
  opacity: 0.7;
}

/* 门的轮廓 */
.door-shape {
  width: 120px;
  height: 220px;
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 4px;
}

/* ===== 第三层：室内轮廓 ===== */
.room-outline {
  background: radial-gradient(circle at center, #2e3b4e, #121820);
}

.light {
  width: 240px;
  height: 240px;
  background: radial-gradient(circle, rgba(255,220,160,0.25), transparent 70%);
}

/* ===== 第四层：桌子 ===== */
.desk-layer {
  background: radial-gradient(circle at center, #3a2f26, #1a1410);
}

.paper {
  width: 160px;
  height: 100px;
  background: #f2f0ea;
  color: #333;
  font-size: 0.8rem;
  padding: 10px;
  box-shadow: 0 12px 24px rgba(0,0,0,0.6);
}

.paper span {
  display: block;
  margin-top: 8px;
  font-size: 0.7rem;
  opacity: 0.6;
}

/* ===== 第五层：窗户 ===== */
.window-layer {
  background: radial-gradient(circle at center, #0b1d2e, #02080f);
}

.window {
  width: 220px;
  height: 160px;
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.7);
}

.window-text {
  position: absolute;
  bottom: 18%;
  font-size: 0.85rem;
  opacity: 0.8;
  text-align: center;
  max-width: 80%;
}
</style>
</head>

<body>

<section class="layer street">
</section>

<section class="layer door">
  <div class="door-shape"></div>
</section>

<section class="layer room-outline">
  <div class="light"></div>
</section>

<section class="layer desk-layer">
  <div class="paper">
    未完成的内核设计
    <span>“如果这里出错，世界会停下来。”</span>
  </div>
</section>

<section class="layer window-layer">
  <div class="window"></div>
  <div class="window-text">
    城市还醒着，<br>但我还在想一个没写完的系统。
  </div>
</section>

</body>
</html>
