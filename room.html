<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Judy's Room</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
}

/* ===== 房间整体 ===== */
.scene {
    
  position: relative;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 30% 40%, #2e3b4e, #121820 70%);
}
/* 默认：PC 端隐藏手机入口 */
.mobile-entry {
  display: none;
}

/* 微弱灯光 */
.light {
  position: absolute;
  top: 15%;
  left: 40%;
  width: 500px;
  height: 400px;
  background: radial-gradient(circle, rgba(255,230,180,0.18), transparent 70%);
  pointer-events: none;
}

/* ===== 窗户 ===== */
.window {
  position: absolute;
  top: 10%;
  left: 10%;
  width: 320px;
  height: 220px;
  background: linear-gradient(#0b1d2e, #02080f);
  border: 4px solid #2a2a2a;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
}

.window::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 60%);
}

/* 窗户文字 */
.window-text {
  position: absolute;
  bottom: -2.2rem;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 0.9rem;
  color: #cfd8e3;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.window:hover .window-text {
  opacity: 1;
}

/* ===== 桌子 ===== */
.desk {
  position: absolute;
  bottom: 18%;
  left: 38%;
  width: 360px;
  height: 160px;
  background: linear-gradient(#3b2f26, #2a1f18);
  border-radius: 8px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* 纸张 */
.paper {
  position: absolute;
  top: -40px;
  left: 40px;
  width: 140px;
  height: 90px;
  background: #f2f0ea;
  transform: rotate(-4deg);
  box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  cursor: pointer;
}

.paper::after {
  content: "未完成的内核草稿";
  font-size: 0.75rem;
  color: #333;
  position: absolute;
  top: 12px;
  left: 10px;
}

/* 纸张文字 */
.paper-text {
  position: absolute;
  top: -90px;
  left: -20px;
  width: 200px;
  font-size: 0.85rem;
  color: #e6e6e6;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.paper:hover .paper-text {
  opacity: 1;
}

/* ===== 书架 ===== */
.shelf {
  position: absolute;
  right: 8%;
  top: 20%;
  width: 120px;
  height: 300px;
  background: #1b1b1b;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.7);
}

.book {
  width: 100%;
  height: 24px;
  margin: 6px 0;
  background: #5a4634;
  opacity: 0.6;
  transition: opacity 0.4s;
}

.book:hover {
  opacity: 1;
}

/* ===== Nick 的便签 ===== */
.note {
  position: absolute;
  bottom: 12%;
  right: 18%;
  width: 120px;
  height: 80px;
  background: #fff3a0;
  transform: rotate(6deg);
  font-size: 0.75rem;
  padding: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  cursor: pointer;
}

.note span {
  opacity: 0;
  transition: opacity 0.5s ease;
}

.note:hover span {
  opacity: 1;
}

@media (max-width: 768px) {
  .mobile-entry {
  display: block;
  }

  body {
    overflow: auto;
  }

  /* 隐藏整个房间的复杂物件 */
  .window,
  .desk,
  .shelf,
  .note,
  .light {
    display: none;
  }

  /* 用一个简单的进入视图代替 */
  .scene {
    background: linear-gradient(180deg, #121820, #1e2a38);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .mobile-entry {
    color: #eaeaea;
    max-width: 420px;
    text-align: center;
  }

  .mobile-entry h1 {
    font-size: 1.6rem;
    margin-bottom: 1rem;
  }

  .mobile-entry p {
    font-size: 1rem;
    line-height: 1.7;
    opacity: 0.85;
  }

  .mobile-entry a {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.8rem 1.6rem;
    border-radius: 999px;
    background: #ffb703;
    color: #000;
    text-decoration: none;
    font-weight: 600;
  }
}



</style>
</head>

<body>

<div class="scene">

  <div class="mobile-entry">
    <h1>Judy 的出租屋</h1>
    <p>
      夜已经很深了。<br>
      城市还醒着，房间里只有一盏灯。
    </p>
    <a href="blog-index.html">进入房间</a>
  </div>


  <div class="light"></div>

  <!-- 窗户 -->
  <div class="window">
    <div class="window-text">
      城市还醒着，但这里很安静。
    </div>
  </div>

  <!-- 桌子 -->
  <div class="desk">
    <div class="paper">
      <div class="paper-text">
        “如果调度失败，整个世界都会停下来。”
      </div>
    </div>
  </div>

  <!-- 书架 -->
  <div class="shelf">
    <div class="book"></div>
    <div class="book"></div>
    <div class="book"></div>
    <div class="book"></div>
    <div class="book"></div>
  </div>

  <!-- Nick 的便签 -->
  <div class="note">
    <span>You still owe me one, Carrots.</span>
  </div>

</div>

</body>
</html>
