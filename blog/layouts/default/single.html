<!-- single.html模板：告诉 Hugo “把文章渲染到 <article class="post-content"> 这里” -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章标题</title>
  <link rel="stylesheet" href="blog.css">
</head>

<body class="light essay"> <!-- light/dark/holiday + essay/note/project -->
  <header>
    <h1 class="post-title">文章标题</h1>
    <div class="post-meta">Yuting 的出租屋笔记空间</div>
  </header>


  <!-- 文章正文：.md内容渲染到该<article>标签中 -->
  <article class="blog-content">
    <p>这里是文章正文内容…</p>
    <pre><code class="language-c">
// 示例代码块
int main() {
    return 0;
}
    </code></pre>
    <img src="images/example.jpg" alt="示例图片">
  </article>


  <footer>
    <div>© 2026 Yuting 的出租屋笔记空间</div>
  </footer>
</body>
</html>
